<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alpha Bank | Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body class="app-body" data-protected="true">
  <div class="app-layout">
    <aside class="sidebar glass-card">
      <div>
        <div class="logo-block">
          <div class="brand-badge">AB</div>
          <div>
            <p class="eyebrow">Alpha Bank</p>
            <h2>Banking Suite</h2>
          </div>
        </div>

        <nav class="nav-menu">
          <a href="dashboard.html" class="nav-link">Overview</a>
          <a href="transfer.html" class="nav-link">Transfer</a>
          <a href="transactions.html" class="nav-link">Transactions</a>
          <a href="profile.html" class="nav-link active">Profile</a>
        </nav>
      </div>

      <button class="btn btn-secondary btn-block logout-btn">Logout</button>
    </aside>

    <main class="main-content">
      <header class="topbar glass-card">
        <div>
          <p class="eyebrow">Profile</p>
          <h1>Account Details</h1>
        </div>
      </header>

      <section class="content-grid single-panel">
        <article class="panel glass-card profile-panel">
          <div class="profile-avatar">AB</div>
          <div class="profile-grid">
            <div class="profile-item">
              <span>Username</span>
              <strong id="profileUsername">-</strong>
            </div>
            <div class="profile-item">
              <span>Account Number</span>
              <strong id="profileAccountNumber">-</strong>
            </div>
            <div class="profile-item">
              <span>Available Balance</span>
              <strong id="profileBalance">₦0.00</strong>
            </div>
            <div class="profile-item">
              <span>Total Transactions</span>
              <strong id="profileTransactionCount">0</strong>
            </div>
          </div>
          <button class="btn btn-primary logout-btn">Logout</button>
        </article>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
  <script src="auth.js"></script>
  <script src="transactions.js"></script>
</body>
</html>
