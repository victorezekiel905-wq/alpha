<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alpha Bank | Transactions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body class="app-body" data-protected="true">
  <div class="app-layout">
    <aside class="sidebar glass-card">
      <div>
        <div class="logo-block">
          <div class="brand-badge">AB</div>
          <div>
            <p class="eyebrow">Alpha Bank</p>
            <h2>Banking Suite</h2>
            <p class="brand-tagline">Next Generation Digital Banking</p>
          </div>
        </div>

        <nav class="nav-menu">
          <a href="dashboard.html" class="nav-link">Overview</a>
          <a href="transfer.html" class="nav-link">Transfer</a>
          <a href="transactions.html" class="nav-link active">Transactions</a>
          <a href="profile.html" class="nav-link">Profile</a>
        </nav>
      </div>

      <button class="btn btn-secondary btn-block logout-btn">Logout</button>
    </aside>

    <main class="main-content">
      <header class="topbar glass-card">
        <div>
          <p class="eyebrow">Transactions</p>
          <h1>Activity History</h1>
          <p class="page-description">Review every debit and credit with vivid status indicators and mobile-friendly cards.</p>
        </div>
      </header>

      <section class="content-grid single-panel">
        <article class="panel glass-card">
          <div class="panel-header">
            <div>
              <p class="eyebrow">All records</p>
              <h3>Transaction History</h3>
            </div>
          </div>
          <div id="transactionsTableWrapper" class="table-wrapper"></div>
        </article>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="script.js"></script>
  <script src="auth.js"></script>
  <script src="transactions.js"></script>
</body>
</html>
